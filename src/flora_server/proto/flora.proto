syntax = "proto3";
package flora;

service FloraManagerService {
  // Seed operations
  rpc CreateSeed(CreateSeedRequest) returns (CreateSeedResponse);
  rpc UpdateSeed(UpdateSeedRequest) returns (UpdateSeedResponse);
  rpc ListSeed(ListSeedRequest) returns (ListSeedResponse);
  rpc DeleteSeed(DeleteSeedRequest) returns (DeleteSeedResponse);

  // App operations
  rpc CreateApp(CreateAppRequest) returns (CreateAppResponse);
  rpc UpdateApp(UpdateAppRequest) returns (UpdateAppResponse);
  rpc RenameApp(RenameAppRequest) returns (RenameAppResponse);
  rpc DeleteApp(DeleteAppRequest) returns (DeleteAppResponse);

  // Env operations
  rpc ListEnvironment(ListEnvironmentRequest) returns (ListEnvironmentResponse);
  rpc SetEnvironment(SetEnvironmentRequest) returns (SetEnvironmentResponse);
  rpc DeleteEnvironment(DeleteEnvironmentRequest) returns (DeleteEnvironmentResponse);

  // Run operations
  rpc RunConfig(RunConfigRequest) returns (RunConfigResponse);
  rpc RunTricks(RunTricksRequest) returns (RunTricksResponse);
  rpc RunExecutable(RunExecutableRequest) returns (RunExecutableResponse);
  rpc RunApp(RunAppRequest) returns (RunAppResponse);
}

enum SeedType {
  SEED_TYPE_UNSPECIFIED = 0;
  SEED_TYPE_WINE = 1;
  SEED_TYPE_PROTON = 2;
}

message CreateSeedRequest {
  string seed_name = 1;
  SeedType seed_type = 2;
  optional string prefix = 3;
  optional string runtime = 4;
  optional string game_id = 5;
  optional string game_store = 6;
}

message CreateSeedResponse {}

message UpdateSeedRequest {
  string seed_name = 1;
  optional string prefix = 3;
  optional string runtime = 4;
  optional string game_id = 5;
  optional string game_store = 6;
}

message UpdateSeedResponse {}

message ListSeedRequest {}

message ListSeedResponse {
  repeated ListSeedItem seeds = 1;
}

message DeleteSeedRequest {
  string seed_name = 1;
}

message DeleteSeedResponse {}

message ListSeedItem {
  string seed_name = 1;
  string seed_type = 2;
}

message RunConfigRequest {
  string seed_name = 1;
}

message RunConfigResponse {}

message RunTricksRequest {
  string seed_name = 1;
}

message RunTricksResponse {}

message RunExecutableRequest {
  string seed_name = 1;
  string command_line = 2;
}

message RunExecutableResponse {}

message RunAppRequest {
  string seed_name = 1;
  string app_name = 2;
}

message RunAppResponse {}

message CreateAppRequest {
  string seed_name = 1;
  string app_name = 2;
  string app_location = 3;
}

message CreateAppResponse {}

message UpdateAppRequest {
  string seed_name = 1;
  string app_name = 2;
  string app_location = 3;
}

message UpdateAppResponse {}

message RenameAppRequest {
  string seed_name = 1;
  string app_name = 2;
  string new_app_name = 3;
}

message RenameAppResponse {}

message DeleteAppRequest {
  string seed_name = 1;
  string app_name = 2;
}

message DeleteAppResponse {}

message ListEnvironmentRequest {
  string seed_name = 1;
}

message ListEnvironmentResponse {
  repeated ListEnvironmentItem items = 1;
}

message ListEnvironmentItem {
  string env_name = 1;
  string env_value = 2;
}

message SetEnvironmentRequest {
  string seed_name = 1;
  string env_name = 2;
  string env_value = 3;
}

message SetEnvironmentResponse {}

message DeleteEnvironmentRequest {
  string seed_name = 1;
  string env_name = 2;
}

message DeleteEnvironmentResponse {}
